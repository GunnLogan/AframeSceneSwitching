<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Aframe Scene Switching</title>

    <script src="https://unpkg.com/aframe@1.4.2/dist/aframe-master.min.js"></script>

    <!-- Two scenes switching in between2 -->
    <script src="scenes/dayScene.js"></script>
    <script src="scenes/nightScene.js"></script>

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      a-scene {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
      }

      canvas {
        display: block;
      }

      #start-screen {
        position: fixed;
        inset: 0;
        z-index: 10;
        background: rgb(20, 1, 1);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        text-align: center;
      }

      #start-button {
        font-size: 24px;
        padding: 16px 32px;
        cursor: pointer;
        border: 0;
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <div id="start-screen">
      <h1>Aframe Scene Switching</h1>
      <p>WASD in browser. Meta Quest controllers in VR.</p>
      <button id="start-button">Start Project</button>
    </div>

    <a-scene
      vr-mode-ui="enabled: true"
      webxr="referenceSpaceType: local; requiredFeatures: local"
    >
      <a-entity id="world-root"></a-entity>

      <a-entity id="player-rig" position="0 0 0">
        <a-camera id="camera" position="0 1.6 0" look-controls></a-camera>

        <a-entity
          id="mouse-cursor"
          cursor="rayOrigin: mouse; fuse: false"
          raycaster="objects: .clickable"
        ></a-entity>

        <a-entity
          id="left-controller"
          laser-controls="hand: left"
          raycaster="objects: .clickable"
          line="color: #00ffff"
        ></a-entity>

        <a-entity
          id="right-controller"
          laser-controls="hand: right"
          raycaster="objects: .clickable"
          line="color: #00ffff"
        ></a-entity>
      </a-entity>
    </a-scene>

    <script>
      window.addEventListener('load', () => {
        if (typeof AFRAME === 'undefined') {
          document.body.innerHTML = `
            <div style="font-family: Arial; padding: 40px;">
              <h1>A-Frame failed to load</h1>
              <p>Check your internet connection or CDN access.</p>
            </div>
          `;
          return;
        }

        if (typeof THREE === 'undefined') {
          throw new Error('THREE failed to load. A-Frame may not have loaded correctly.');
        }

        if (!window.DAY_SCENE || !window.NIGHT_SCENE) {
          throw new Error('Scene scripts did not load. Check that scenes/dayScene.js and scenes/nightScene.js exist.');
        }

        const startScreen = document.querySelector('#start-screen');
        const startButton = document.querySelector('#start-button');
        const worldRoot = document.querySelector('#world-root');
        const playerRig = document.querySelector('#player-rig');
        const camera = document.querySelector('#camera');

        let currentScene = 'dayScene';

        AFRAME.registerComponent('wasd-move', {
          schema: {
            speed: { type: 'number', default: 3 }
          },

          init: function () {
            this.keys = {};

            window.addEventListener('keydown', (event) => {
              this.keys[event.code] = true;
            });

            window.addEventListener('keyup', (event) => {
              this.keys[event.code] = false;
            });
          },

          tick: function (time, deltaTime) {
            const deltaSeconds = deltaTime / 1000;
            const position = this.el.object3D.position;
            const cameraRotation = camera.object3D.rotation;
            const speed = this.data.speed * deltaSeconds;

            const forward = new THREE.Vector3(0, 0, -1);
            forward.applyEuler(new THREE.Euler(0, cameraRotation.y, 0));
            forward.y = 0;
            forward.normalize();

            const right = new THREE.Vector3(1, 0, 0);
            right.applyEuler(new THREE.Euler(0, cameraRotation.y, 0));
            right.y = 0;
            right.normalize();

            if (this.keys['KeyW']) {
              position.add(forward.clone().multiplyScalar(speed));
            }

            if (this.keys['KeyS']) {
              position.add(forward.clone().multiplyScalar(-speed));
            }

            if (this.keys['KeyA']) {
              position.add(right.clone().multiplyScalar(-speed));
            }

            if (this.keys['KeyD']) {
              position.add(right.clone().multiplyScalar(speed));
            }
          }
        });

        AFRAME.registerComponent('switch-button', {
          init: function () {
            this.el.addEventListener('click', () => {
              switchScene();
            });

            this.el.addEventListener('mouseenter', () => {
              this.el.setAttribute('scale', '1.2 1.2 1.2');
            });

            this.el.addEventListener('mouseleave', () => {
              this.el.setAttribute('scale', '1 1 1');
            });
          }
        });

        const scenes = {
          dayScene: window.DAY_SCENE,
          nightScene: window.NIGHT_SCENE
        };

        function createEntity(definition) {
          const el = document.createElement(definition.tag);

          for (const [name, value] of Object.entries(definition.attrs)) {
            el.setAttribute(name, value);
          }

          return el;
        }

        function unloadCurrentScene() {
          while (worldRoot.firstChild) {
            worldRoot.removeChild(worldRoot.firstChild);
          }
        }

        function loadScene(sceneName) {
          if (!scenes[sceneName]) {
            console.error(`Scene "${sceneName}" does not exist.`);
            return;
          }

          currentScene = sceneName;
          unloadCurrentScene();

          scenes[sceneName].forEach((definition) => {
            const el = createEntity(definition);
            worldRoot.appendChild(el);
          });

          playerRig.setAttribute('position', '0 0 0');
        }

        function switchScene() {
          if (currentScene === 'dayScene') {
            loadScene('nightScene');
          } else {
            loadScene('dayScene');
          }
        }

        playerRig.setAttribute('wasd-move', 'speed: 3');

        startButton.addEventListener('click', () => {
          startScreen.style.display = 'none';
          loadScene('dayScene');
        });
      });
    </script>
  </body>
</html>
